function makeSVG(en,cat){
const s={Greetings:"#F0997B",Introductions:"#EF9F27","Check-In":"#AFA9EC",Documents:"#5DCAA5","Key Phrases":"#85B7EB"};
const c=s[cat]||"#B4B2A9";
const e=en.toLowerCase();
if(e.includes("hello")||e.includes("hi")){return`<svg viewBox="0 0 80 80" width="70" height="50"><circle cx="40" cy="28" r="16" fill="${c}" opacity=".25"/><ellipse cx="40" cy="60" rx="22" ry="12" fill="${c}" opacity=".18"/><circle cx="40" cy="28" r="10" fill="${c}"/><line x1="24" y1="22" x2="18" y2="16" stroke="${c}" stroke-width="2.5" stroke-linecap="round"/><line x1="56" y1="22" x2="62" y2="16" stroke="${c}" stroke-width="2.5" stroke-linecap="round"/></svg>`;}
if(e.includes("passport")||e.includes("visa")||e.includes("ticket")||e.includes("boarding")||e.includes("e-ticket")){return`<svg viewBox="0 0 80 80" width="70" height="50"><rect x="14" y="20" width="52" height="38" rx="4" fill="${c}" opacity=".2" stroke="${c}" stroke-width="1.5"/><rect x="20" y="26" width="16" height="20" rx="2" fill="${c}"/><line x1="42" y1="30" x2="60" y2="30" stroke="${c}" stroke-width="1.5" stroke-linecap="round"/><line x1="42" y1="37" x2="60" y2="37" stroke="${c}" stroke-width="1.5" stroke-linecap="round"/><line x1="42" y1="44" x2="55" y2="44" stroke="${c}" stroke-width="1.5" stroke-linecap="round"/></svg>`;}
if(e.includes("luggage")||e.includes("bag")||e.includes("carry")||e.includes("suitcase")||e.includes("baggage")||e.includes("overweight")){return`<svg viewBox="0 0 80 80" width="70" height="50"><rect x="16" y="26" width="48" height="36" rx="5" fill="${c}" opacity=".2" stroke="${c}" stroke-width="1.5"/><rect x="28" y="18" width="24" height="10" rx="3" fill="none" stroke="${c}" stroke-width="1.5"/><line x1="40" y1="26" x2="40" y2="62" stroke="${c}" stroke-width="1.5" stroke-linecap="round"/><circle cx="22" cy="63" r="4" fill="${c}"/><circle cx="58" cy="63" r="4" fill="${c}"/></svg>`;}
if(e.includes("gate")||e.includes("terminal")||e.includes("airport")){return`<svg viewBox="0 0 80 80" width="70" height="50"><rect x="10" y="45" width="60" height="18" rx="3" fill="${c}" opacity=".2"/><path d="M10 45 Q40 15 70 45" fill="${c}" opacity=".15" stroke="${c}" stroke-width="1.5"/><rect x="32" y="38" width="16" height="25" rx="2" fill="${c}" opacity=".3"/><line x1="10" y1="63" x2="70" y2="63" stroke="${c}" stroke-width="1.5"/></svg>`;}
if(e.includes("seat")){return`<svg viewBox="0 0 80 80" width="70" height="50"><rect x="20" y="20" width="40" height="28" rx="4" fill="${c}" opacity=".2" stroke="${c}" stroke-width="1.5"/><rect x="16" y="45" width="48" height="12" rx="3" fill="${c}" opacity=".3" stroke="${c}" stroke-width="1.5"/><rect x="12" y="30" width="8" height="22" rx="3" fill="${c}" opacity=".4"/><rect x="60" y="30" width="8" height="22" rx="3" fill="${c}" opacity=".4"/></svg>`;}
if(e.includes("check in")||e.includes("check-in")){return`<svg viewBox="0 0 80 80" width="70" height="50"><rect x="14" y="22" width="52" height="36" rx="4" fill="${c}" opacity=".15" stroke="${c}" stroke-width="1.5"/><line x1="14" y1="34" x2="66" y2="34" stroke="${c}" stroke-width="1.5"/><polyline points="28,46 36,54 54,38" fill="none" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}
if(e.includes("flight")||e.includes("depart")||e.includes("plane")){return`<svg viewBox="0 0 80 80" width="70" height="50"><path d="M12 50 L40 20 L68 50" fill="${c}" opacity=".15" stroke="${c}" stroke-width="1.5" stroke-linejoin="round"/><path d="M28 40 L40 20 L52 40" fill="${c}" opacity=".3"/><line x1="20" y1="55" x2="60" y2="55" stroke="${c}" stroke-width="2" stroke-linecap="round"/><line x1="15" y1="62" x2="65" y2="62" stroke="${c}" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4,3"/></svg>`;}
if(e.includes("form")||e.includes("card")||e.includes("arrival")||e.includes("departure card")||e.includes("customs")||e.includes("itinerary")||e.includes("insurance")||e.includes("booking")||e.includes("confirmation")){return`<svg viewBox="0 0 80 80" width="70" height="50"><rect x="18" y="14" width="44" height="54" rx="4" fill="${c}" opacity=".15" stroke="${c}" stroke-width="1.5"/><line x1="26" y1="28" x2="54" y2="28" stroke="${c}" stroke-width="1.5" stroke-linecap="round"/><line x1="26" y1="37" x2="54" y2="37" stroke="${c}" stroke-width="1.5" stroke-linecap="round"/><line x1="26" y1="46" x2="44" y2="46" stroke="${c}" stroke-width="1.5" stroke-linecap="round"/><circle cx="54" cy="54" r="7" fill="${c}" opacity=".3" stroke="${c}" stroke-width="1.5"/><polyline points="50,54 53,57 59,51" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}
if(e.includes("credit")){return`<svg viewBox="0 0 80 80" width="70" height="50"><rect x="12" y="24" width="56" height="34" rx="5" fill="${c}" opacity=".2" stroke="${c}" stroke-width="1.5"/><rect x="12" y="32" width="56" height="10" fill="${c}" opacity=".3"/><line x1="20" y1="48" x2="36" y2="48" stroke="${c}" stroke-width="2" stroke-linecap="round"/><circle cx="54" cy="49" r="5" fill="${c}" opacity=".5"/><circle cx="60" cy="49" r="5" fill="${c}" opacity=".3"/></svg>`;}
if(e.includes("name")||e.includes("id")||e.includes("introduction")){return`<svg viewBox="0 0 80 80" width="70" height="50"><rect x="16" y="24" width="48" height="34" rx="4" fill="${c}" opacity=".15" stroke="${c}" stroke-width="1.5"/><circle cx="30" cy="37" r="8" fill="${c}" opacity=".4"/><line x1="42" y1="34" x2="58" y2="34" stroke="${c}" stroke-width="1.5" stroke-linecap="round"/><line x1="42" y1="41" x2="58" y2="41" stroke="${c}" stroke-width="1.5" stroke-linecap="round"/></svg>`;}
return`<svg viewBox="0 0 80 80" width="70" height="50"><circle cx="40" cy="35" r="18" fill="${c}" opacity=".2" stroke="${c}" stroke-width="1.5"/><circle cx="40" cy="30" r="7" fill="${c}"/><path d="M22 55 Q40 43 58 55" fill="${c}" opacity=".4" stroke="${c}" stroke-width="1.5" stroke-linecap="round"/></svg>`;
}

function card(w){
const ac=ACCENT[w.cat]||"#B4B2A9";
return`<div class="vcard" data-cat="${w.cat}" data-en="${w.en.toLowerCase()}" data-zh="${w.zh}">
<div class="vcard-accent" style="background:${ac}"></div>
<div class="vcard-body">
<div class="vcard-pic">${makeSVG(w.en,w.cat)}</div>
<div class="vcard-en">${w.en}</div>
<div class="vcard-pron">${w.pron}</div>
<div class="vcard-meaning">${w.meaning}</div>
<hr class="vcard-divider">
<div class="vcard-zh">${w.zh}</div>
<div class="vcard-ex">${w.ex1}</div>
<div class="vcard-ex">${w.ex2}</div>
<div class="vcard-practice">
<div class="vcard-practice-label">✏ Try using this word:</div>
<div class="vcard-practice-item">1. ${w.p1}</div>
<div class="vcard-practice-item">2. ${w.p2}</div>
</div>
</div>
</div>`;
}

const grid=document.getElementById("grid");
const ft=document.getElementById("ft");
grid.innerHTML=words.map(card).join("");
const cards=[...grid.querySelectorAll(".vcard")];

function update(){
const cat=document.querySelector(".fb.active").dataset.cat;
const q=document.getElementById("srch").value.toLowerCase();
let n=0;
cards.forEach(c=>{
const mc=cat==="all"||c.dataset.cat===cat;
const mq=!q||c.dataset.en.includes(q)||c.dataset.zh.includes(q);
const show=mc&&mq;
c.classList.toggle("hidden",!show);
if(show)n++;
});
ft.textContent=`Showing ${n} of ${words.length} words`;
}

document.querySelectorAll(".fb").forEach(b=>b.addEventListener("click",()=>{
document.querySelectorAll(".fb").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
update();
}));
document.getElementById("srch").addEventListener("input",update);
update();
</script>
